#Application Name
spring.application.name=College Library Network
server.port=9090


# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

#  JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

#  Email Settings (fill later in Level 8)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB











# **Replace** `YOUR_POSTGRES_PASSWORD_HERE` with your actual PostgreSQL password

#  **Important:** `spring.jpa.hibernate.ddl-auto=update` means Spring Boot will **automatically create tables** in your database when you run the app. You don't need to write SQL manually to create tables!



